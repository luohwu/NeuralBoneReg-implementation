seed_number: 50

point_cloud_size: 40000
num_optimization_steps: 1000
num_sampled_points: 3000
perturbation_angle_range: 180
perturbation_translation_range: 500

# Case selection: which specimens x anatomies to register (the full dataset by default).
# main_UltraBonesHip.py loops these and skips any (specimen, anatomy) pair whose files are absent.
specimens: [0, 1, 2, 3, 4]
anatomies: ["left_femur", "right_femur", "pelvis"]
num_heads: 5000 # note that the optical value varies on dataset
size_coarse_pcd: 512 # note that the optical value varies on dataset
refine_heads: 64 # note that the optical value varies on dataset
num_runs: 10
show_registration_visualization: false   # true opens blocking Open3D windows (needs a display); keep false for headless/Docker runs

# Registration score aggregation. "trimmed" scores each pose hypothesis by the mean
# UDF over only the closest `trim_keep` fraction of points, ignoring the far tail, so a
# residual off-bone fragment cannot bias the fit (registration-time keep-largest). This
# is the femur default; main_UltraBonesHip.py automatically overrides score_mode to "mean"
# for the pelvis (trimming unbalances its two-sided shape), so a pelvis run needs no manual change.
score_mode: trimmed
trim_keep: 0.6

# Extract the externally-visible (outer) shell of the preoperative CT mesh before
# training NeuralUDF, so the target is exactly what ultrasound can observe (internal CT
# faces are removed). Cached next to the original as <stem>_outer_surface.stl. Default on.
preop_outer_surface: true
# Ray budget for the extraction (viewpoints on a surrounding sphere x pixels per view).
# Higher = fewer grazing-angle holes; 128 x 384 leaves the femur watertight (a pelvis
# loses ~15% of its surface at the old 64 x 192). Raise to 256/512 for a stubborn mesh.
outer_surface_views: 128
outer_surface_pixels: 384

preoperative_data_dir: "./data/UltraBonesHip/preoperative"
intraoperative_data_dir: "./data/UltraBonesHip/intraoperative"
checkpoint_root: "./checkpoints_NeuralUDF/UltraBonesHip"
udf_config_file: "./models/NeuralUDF/conf/conf_NeuralUDF.conf"

